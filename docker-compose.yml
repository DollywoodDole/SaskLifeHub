version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sasklifehub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sasklifehub
      POSTGRES_USER: sasklifehub
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7-alpine
    container_name: sasklifehub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sasklifehub-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://sasklifehub:password@postgres:5432/sasklifehub
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sasklifehub-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_AUTH_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
